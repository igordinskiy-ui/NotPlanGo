<!doctype html><html><head><meta charset="utf-8"><style>
  html, body { margin:0; width:1080px; height:1920px; overflow:hidden; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; color:#2f302b; background:#efe6d7; }
  * { box-sizing:border-box; }
  .canvas { width:1080px; height:1920px; position:relative; overflow:hidden; background: radial-gradient(circle at 18% 12%, rgba(255,255,255,.95), transparent 420px), linear-gradient(135deg,#f8f2e8 0%,#e9dcc8 100%); }
  .brand { font-size:32px; font-weight:900; letter-spacing:0; color:#87915f; }
  .eyebrow { color:#7b765f; font-weight:900; text-transform:uppercase; letter-spacing:0; font-size:24px; }
  h1 { margin:0; font-size:86px; line-height:.96; letter-spacing:0; max-width:760px; }
  p { margin:0; color:#6c6657; font-size:30px; line-height:1.25; }
  .phone { width:390px; border-radius:44px; padding:16px; background:#171714; box-shadow:0 38px 90px rgba(57,49,34,.28); }
  .phone img { display:block; width:100%; border-radius:30px; }
  .device { border-radius:28px; padding:14px; background:#171714; box-shadow:0 30px 80px rgba(57,49,34,.22); }
  .device img { display:block; width:100%; border-radius:16px; }
  .card { border-radius:22px; background:rgba(255,255,255,.72); border:1px solid rgba(81,76,61,.08); box-shadow:0 24px 70px rgba(83,73,53,.12); }
.copy{position:absolute;left:74px;top:86px;right:74px;display:grid;gap:24px}.phone{position:absolute;left:345px;top:552px;transform:scale(1.15);transform-origin:top left}.chips{position:absolute;left:76px;bottom:92px;right:76px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.chip{padding:24px;border-radius:18px;background:#fffaf2;color:#59633a;font-weight:900;font-size:27px;text-align:center;box-shadow:0 18px 45px rgba(83,73,53,.1)}</style></head><body><main class="canvas"><section class="copy"><div class="brand">PlanerGO</div><div class="eyebrow">mobile-first PWA</div><h1>Неделя без таблиц</h1><p>Задачи, привычки, прогресс дня и вечерний итог в одном спокойном интерфейсе.</p></section><div class="phone"><img src="01-phone-today.png" /></div><div class="chips"><div class="chip">Сегодня</div><div class="chip">Неделя</div><div class="chip">Привычки</div></div></main></body></html>
